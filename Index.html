<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/Style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Weather-Scope App</title>
  </head>
  <body>
    <div class="App">
      <header>
        <form>
          <input type="search" placeholder="Enter a city.." required />
          <input type="submit" value="Search" />
        </form>
      </header>
      <main>
        <div>
          <h1>Johannesburg</h1>
          <p>
            Thursday 15:40, overcast clouds
            <br />
            Humidity: 62%, Wind: 1.03km/h
          </p>
        </div>
        <div>⛅ 24°C</div>
      </main>

      <footer>
        Coded by
        <a href="https://github.com/Thorii08" target="_blank"> Thoriso Zozi</a>
        open-sourced on
        <a href="https://github.com/Thorii08/Weather-Scope" target="_blank"
          >GitHub
        </a>
        and hosted on
        <a href="https://cloud-temp.netlify.app/" target="_blank">Netlify</a>
      </footer>
    </div>
  </body>
</html>
