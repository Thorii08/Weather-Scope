<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/Style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Weather-Scope App</title>
  </head>
  <body>
    <div class="App">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city.."
            required
            class="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city">Johannesburg</h1>
            <p class="weather-app-details">
              Thursday 15:40, overcast clouds
              <br />
              Humidity: <strong>62%</strong> , Wind: <strong>1.03km/h</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div class="weather-app-icon">⛅</div>
            <div class="weather-app-temperature-value">24</div>
            <div class="weather-app-unit">°C</div>
          </div>
        </div>
      </main>

      <footer>
        Coded by
        <a href="https://github.com/Thorii08" target="_blank"> Thoriso Zozi</a>
        open-sourced on
        <a href="https://github.com/Thorii08/Weather-Scope" target="_blank"
          >GitHub
        </a>
        and hosted on
        <a href="https://cloud-temp.netlify.app/" target="_blank">Netlify</a>
      </footer>
    </div>
  </body>
</html>
